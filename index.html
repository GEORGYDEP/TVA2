<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVA Master — Maîtrise la comptabilisation de la TVA</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1118;
  --bg-card: #181b27;
  --bg-card-hover: #1e2233;
  --surface: #232840;
  --border: #2a3050;
  --text: #e8eaf0;
  --text-dim: #8b90a8;
  --text-muted: #5a5f78;
  --accent: #4f8cff;
  --accent-glow: rgba(79,140,255,0.25);
  --success: #2dd4a0;
  --success-bg: rgba(45,212,160,0.12);
  --error: #ff5f6d;
  --error-bg: rgba(255,95,109,0.12);
  --warning: #ffb347;
  --warning-bg: rgba(255,179,71,0.12);
  --gold: #ffd700;
  --tva6: #2dd4a0;
  --tva12: #ffb347;
  --tva21: #ff5f6d;
  --debit: #4f8cff;
  --credit: #e879f9;
  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(79,140,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(232,121,249,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(45,212,160,0.04) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(79,140,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,140,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

.app-container {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 20px; min-height: 100vh;
}

/* ========== HEADER ========== */
.header { text-align: center; padding: 40px 20px 30px; }

.header-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 50px; padding: 6px 16px;
  font-size: 0.8rem; color: var(--text-dim);
  margin-bottom: 16px; letter-spacing: 0.5px; text-transform: uppercase;
}

.header-badge .dot {
  width: 6px; height: 6px; background: var(--success);
  border-radius: 50%; animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

.header h1 {
  font-size: 2.8rem; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, #e879f9 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 8px;
}

.header .subtitle { font-size: 1.05rem; color: var(--text-dim); font-weight: 400; }

/* ========== PROGRESS BAR ========== */
.progress-section { margin: 20px 0 30px; }

.progress-stats {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px; font-size: 0.85rem;
}

.progress-stats .label { color: var(--text-dim); }

.progress-stats .score {
  font-family: 'Space Mono', monospace;
  color: var(--gold); font-weight: 700; font-size: 0.95rem;
}

.progress-bar-container {
  background: var(--surface); border-radius: 10px;
  height: 14px; overflow: hidden; border: 1px solid var(--border);
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #e879f9);
  border-radius: 10px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
  position: relative;
  min-width: 0;
}

.progress-bar-fill.has-progress { min-width: 14px; }

/* ========== EXERCISE NAVIGATION ========== */
.exercise-nav { display: flex; gap: 6px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }

.nav-dot {
  width: 42px; height: 42px; border-radius: 12px;
  border: 2px solid var(--border); background: var(--bg-card);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700;
  cursor: pointer; transition: var(--transition);
  color: var(--text-muted); position: relative;
}

.nav-dot:hover:not(.locked) { border-color: var(--accent); color: var(--text); }
.nav-dot.active { border-color: var(--accent); background: rgba(79,140,255,0.15); color: var(--accent); }
.nav-dot.completed { border-color: var(--success); background: rgba(45,212,160,0.12); color: var(--success); }

.nav-dot.completed::after {
  content: '✓'; position: absolute; top: -6px; right: -6px;
  width: 16px; height: 16px; background: var(--success); border-radius: 50%;
  font-size: 0.6rem; display: flex; align-items: center; justify-content: center;
  color: #000; font-weight: 900;
}

.nav-dot.locked {
  opacity: 0.35; cursor: not-allowed;
  background: var(--bg);
}

/* ========== EXERCISE CARD ========== */
.exercise-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 32px;
  box-shadow: var(--shadow); animation: slideIn 0.4s ease-out;
  position: relative; overflow: hidden;
}

.exercise-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), #e879f9, var(--success));
}

@keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.exercise-header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }

.exercise-number {
  font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700;
  color: var(--accent); background: rgba(79,140,255,0.12);
  padding: 4px 10px; border-radius: 6px; letter-spacing: 1px; text-transform: uppercase;
}

.exercise-type {
  font-size: 0.7rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
}

.exercise-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; color: #fff; }

.exercise-desc {
  color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px;
}
.exercise-desc strong { color: var(--text); font-weight: 600; }

/* ========== INFO BOX ========== */
.info-box {
  background: rgba(79,140,255,0.08); border: 1px solid rgba(79,140,255,0.2);
  border-radius: var(--radius); padding: 16px 20px; margin-bottom: 24px;
  font-size: 0.9rem; line-height: 1.6; color: var(--text-dim);
}
.info-box strong { color: var(--accent); }

/* ========== SCENARIO BOX ========== */
.scenario-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px;
  position: relative;
}

.scenario-box::before {
  content: '🏢'; position: absolute; top: -12px; left: 16px;
  font-size: 1.3rem; background: var(--bg-card); padding: 0 8px;
}

.scenario-company { font-weight: 700; font-size: 1.1rem; color: #fff; margin-bottom: 4px; margin-top: 4px; }
.scenario-detail { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; }

/* ========== QUESTION ITEMS ========== */
.question-group { margin-bottom: 20px; }

.question-label {
  font-size: 0.95rem; color: var(--text); margin-bottom: 10px; font-weight: 500; line-height: 1.5;
}
.question-label .q-num {
  font-family: 'Space Mono', monospace; color: var(--accent); font-weight: 700; margin-right: 6px;
}

/* Rate selection buttons */
.rate-options { display: flex; gap: 10px; flex-wrap: wrap; }

.rate-btn {
  padding: 10px 20px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--surface);
  color: var(--text); font-family: 'Space Mono', monospace;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  transition: var(--transition); min-width: 70px; text-align: center;
}

.rate-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--bg-card-hover); }
.rate-btn.selected { border-color: var(--accent); background: rgba(79,140,255,0.15); color: var(--accent); }
.rate-btn.correct { border-color: var(--success) !important; background: var(--success-bg) !important; color: var(--success) !important; }
.rate-btn.wrong { border-color: var(--error) !important; background: var(--error-bg) !important; color: var(--error) !important; }
.rate-btn:disabled { cursor: default; }

/* Input fields */
.input-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }

.input-field {
  background: var(--surface); border: 2px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text); font-family: 'Space Mono', monospace;
  font-size: 0.95rem; width: 140px; transition: var(--transition); outline: none;
}

.input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.input-field.correct { border-color: var(--success) !important; background: var(--success-bg) !important; }
.input-field.wrong { border-color: var(--error) !important; background: var(--error-bg) !important; }
.input-field::placeholder { color: var(--text-muted); font-size: 0.8rem; }

.input-suffix { color: var(--text-dim); font-size: 0.85rem; font-family: 'Space Mono', monospace; }

/* ========== T-ACCOUNT ========== */
.t-account {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
}

.t-account-header {
  text-align: center; padding: 12px; font-weight: 700;
  font-size: 0.95rem; border-bottom: 2px solid var(--border);
}

.t-header-4110 { background: rgba(79,140,255,0.1); color: var(--debit); }
.t-header-4510 { background: rgba(232,121,249,0.1); color: var(--credit); }

.t-account-body { display: grid; grid-template-columns: 1fr 1fr; min-height: 60px; }
.t-col { padding: 12px; }
.t-col-left { border-right: 2px solid var(--border); }

.t-col-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); margin-bottom: 10px; font-weight: 600;
}

.t-entry {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; font-size: 0.85rem; gap: 6px;
}

.t-entry-label {
  color: var(--text-dim); font-size: 0.78rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px;
}

.t-entry .input-field { width: 110px; padding: 8px 10px; font-size: 0.85rem; }

.t-account-footer {
  border-top: 2px solid var(--border);
  display: grid; grid-template-columns: 1fr 1fr;
}

.t-footer-cell {
  padding: 10px 12px; display: flex; justify-content: space-between;
  align-items: center; font-size: 0.85rem; font-weight: 600;
}

.t-footer-cell:first-child { border-right: 2px solid var(--border); }

/* ========== ACCOUNT CHOICE ========== */
.account-choice { display: flex; gap: 10px; }

.account-btn {
  flex: 1; padding: 12px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--surface);
  color: var(--text); font-weight: 600; font-size: 0.9rem;
  cursor: pointer; transition: var(--transition); text-align: center;
}

.account-btn:hover:not(:disabled) { border-color: var(--accent); }
.account-btn.selected-4110 { border-color: var(--debit); background: rgba(79,140,255,0.12); color: var(--debit); }
.account-btn.selected-4510 { border-color: var(--credit); background: rgba(232,121,249,0.12); color: var(--credit); }
.account-btn.correct { border-color: var(--success) !important; background: var(--success-bg) !important; color: var(--success) !important; }
.account-btn.wrong { border-color: var(--error) !important; background: var(--error-bg) !important; color: var(--error) !important; }
.account-btn:disabled { cursor: default; }

/* ========== BUTTONS ========== */
.btn-row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }

.btn {
  padding: 12px 28px; border-radius: 12px; border: none;
  font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: var(--transition);
  display: inline-flex; align-items: center; gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #6c5ce7);
  color: #fff; box-shadow: 0 4px 15px rgba(79,140,255,0.3);
}
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,140,255,0.4); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
.btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-success {
  background: linear-gradient(135deg, var(--success), #00b894);
  color: #000; font-weight: 700;
}
.btn-success:hover:not(:disabled) { transform: translateY(-2px); }
.btn-success:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ========== FEEDBACK ========== */
.feedback {
  margin-top: 20px; padding: 16px 20px; border-radius: var(--radius);
  font-size: 0.9rem; line-height: 1.6; display: none; animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.feedback.show { display: block; }
.feedback.success { background: var(--success-bg); border: 1px solid rgba(45,212,160,0.3); color: var(--success); }
.feedback.error { background: var(--error-bg); border: 1px solid rgba(255,95,109,0.3); color: var(--error); }
.feedback.partial { background: var(--warning-bg); border: 1px solid rgba(255,179,71,0.3); color: var(--warning); }
.feedback strong { color: inherit; }

/* ========== CORRECTION / SUCCESS ITEMS ========== */
.correction-item {
  padding: 10px 14px; background: rgba(255,95,109,0.06);
  border-left: 3px solid var(--error); border-radius: 0 8px 8px 0;
  margin-top: 8px; font-size: 0.85rem; color: var(--text-dim); line-height: 1.5;
}
.correction-item .correct-answer { font-family:'Space Mono',monospace; color:var(--success); font-weight:700; }

.success-item {
  padding: 10px 14px; background: rgba(45,212,160,0.06);
  border-left: 3px solid var(--success); border-radius: 0 8px 8px 0;
  margin-top: 8px; font-size: 0.85rem; color: var(--text-dim); line-height: 1.5;
}

/* ========== RESULTS ========== */
.results-screen { text-align: center; padding: 40px 20px; }
.results-trophy { font-size: 4rem; margin-bottom: 16px; display: block; }

.results-score {
  font-family: 'Space Mono', monospace; font-size: 3rem; font-weight: 700;
  background: linear-gradient(135deg, var(--gold), #ffb347);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
}

.results-label { color: var(--text-dim); font-size: 1rem; margin-bottom: 30px; }

.results-breakdown {
  display: flex; flex-direction: column; gap: 8px;
  max-width: 500px; margin: 0 auto 30px;
}

.result-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; background: var(--surface); border-radius: 10px; font-size: 0.9rem;
  gap: 12px;
}

.result-row .ex-name { color: var(--text-dim); text-align: left; }
.result-row .ex-score { font-family:'Space Mono',monospace; font-weight:700; white-space: nowrap; }
.result-row .ex-score.perfect { color: var(--success); }
.result-row .ex-score.good { color: var(--accent); }
.result-row .ex-score.mid { color: var(--warning); }
.result-row .ex-score.low { color: var(--error); }

/* ========== TABLE ========== */
.data-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.88rem; }

.data-table th {
  background: var(--surface); padding: 10px 12px; text-align: left;
  font-weight: 600; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-dim); border-bottom: 2px solid var(--border);
}

.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
.data-table tr:hover td { background: rgba(79,140,255,0.04); }
.data-table .num { font-family:'Space Mono',monospace; font-weight:600; }
.data-table .rate-6 { color: var(--tva6); }
.data-table .rate-12 { color: var(--tva12); }
.data-table .rate-21 { color: var(--tva21); }

/* ========== CALC ROW ========== */
.calc-row {
  display: flex; align-items: center; gap: 10px; margin: 12px 0;
  padding: 14px 18px; background: var(--surface); border-radius: var(--radius); flex-wrap: wrap;
}

.calc-label { color: var(--text-dim); font-size: 0.9rem; min-width: 180px; }

/* ========== MOBILE CARDS ========== */
.mobile-card { display: none; flex-direction: column; gap: 12px; }

.m-card-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}

.m-card-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px; font-size: 0.85rem;
}

.m-card-row .m-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
.m-card-row .m-value { font-family:'Space Mono',monospace; font-weight:600; }
.m-card-desc { font-size: 0.9rem; color: var(--text); margin-bottom: 8px; font-weight: 500; }
.m-card-inputs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

/* ========== WELCOME ========== */
.welcome-card { text-align: center; padding: 40px 30px; }

.welcome-features {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  max-width: 500px; margin: 24px auto; text-align: left;
}

.feature-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 14px; background: var(--surface); border-radius: var(--radius);
  font-size: 0.85rem; color: var(--text-dim); line-height: 1.4;
}

.feature-icon { font-size: 1.2rem; flex-shrink: 0; }

/* ========== Confetti ========== */
.confetti-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 1000; overflow: hidden;
}

.confetti-piece {
  position: absolute; width: 10px; height: 10px; top: -10px;
  animation: confetti-fall 3s ease-out forwards;
}

@keyframes confetti-fall {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
}

/* ========== RESPONSIVE ========== */
@media (max-width: 640px) {
  .header h1 { font-size: 2rem; }
  .exercise-card { padding: 20px 16px; }
  .nav-dot { width: 36px; height: 36px; font-size: 0.75rem; }
  .input-field { width: 110px; font-size: 0.85rem; }
  .rate-options { gap: 6px; }
  .rate-btn { padding: 8px 14px; min-width: 55px; font-size: 0.85rem; }
  .welcome-features { grid-template-columns: 1fr; }
  .account-choice { flex-direction: column; gap: 6px; }
  .calc-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  .calc-label { min-width: unset; }
  .exercise-title { font-size: 1.25rem; }

  .desktop-table { display: none !important; }
  .mobile-card { display: flex !important; }

  .t-account-body { grid-template-columns: 1fr; }
  .t-col-left { border-right: none; border-bottom: 2px solid var(--border); }
  .t-account-footer { grid-template-columns: 1fr; }
  .t-footer-cell:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  .t-entry-label { max-width: 140px; }
  .t-entry .input-field { width: 100px; }
}

@media (min-width: 641px) {
  .mobile-card { display: none !important; }
}
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-badge"><span class="dot"></span> Comptabilité 4e Technique</div>
    <h1>TVA Master</h1>
    <p class="subtitle">Maîtrise la comptabilisation de la TVA en Belgique</p>
    <div style="display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap; margin-top:14px;">
      <span id="globalTimer" style="font-family:'Space Mono',monospace; font-size:0.85rem; color:var(--text-dim,#8b95a7); display:none; align-items:center; gap:4px; background:rgba(79,140,255,0.08); border:1px solid rgba(79,140,255,0.25); border-radius:8px; padding:6px 10px;">⏱️ 00:00</span>
      <span id="studentBadge" style="display:none; font-size:0.82rem; color:var(--text,#fff); align-items:center; gap:6px; background:rgba(232,121,249,0.08); border:1px solid rgba(232,121,249,0.25); border-radius:8px; padding:6px 10px;"></span>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-stats">
      <span class="label">Progression</span>
      <span class="score" id="totalScore">0 / 100 pts</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
  </div>

  <div class="exercise-nav" id="exerciseNav"></div>
  <div id="contentArea"></div>
</div>

<!-- ============================================================ -->
<!-- ===== MODAL EMAIL (TRACKING) ===== -->
<!-- ============================================================ -->
<div id="emailOverlay" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);align-items:center;justify-content:center;font-family:'Outfit',sans-serif;">

// ======================================================================
// UTILITIES
// ======================================================================
function fmt(n) { return n.toFixed(2).replace('.',','); }
function parseInput(v) { if(!v) return NaN; return parseFloat(v.replace(',','.').replace(/\s/g,'')); }
function isClose(a,b,tol=0.02) { return Math.abs(a-b)<=tol; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Safe numeric OR: picks first non-NaN value (handles 0 correctly unlike ||)
function getVal(id1, id2) {
  const v1 = parseInput(document.getElementById(id1)?.value);
  if(!isNaN(v1)) return v1;
  const v2 = parseInput(document.getElementById(id2)?.value);
  if(!isNaN(v2)) return v2;
  return NaN;
}

// ======================================================================
// NAVIGATION — exercises verrouillés tant que le précédent n'est pas fait
// ======================================================================
function isUnlocked(i) {
  return i === 0 || state.completed[exercises[i-1].id];
}

function renderNav() {
  const nav = document.getElementById('exerciseNav');
  nav.innerHTML = '';
  exercises.forEach((ex,i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot';
    const unlocked = isUnlocked(i);
    if(state.currentExercise === i) dot.classList.add('active');
    if(state.completed[ex.id]) { dot.classList.add('completed'); dot.textContent = ex.number; }
    else if(!unlocked) { dot.classList.add('locked'); dot.textContent = ''; }
    else { dot.textContent = ex.number; }
    dot.addEventListener('click', () => { if(unlocked || state.completed[ex.id]) goToExercise(i); });
    nav.appendChild(dot);
  });
}

function updateProgress() {
  const pct = state.maxPoints > 0 ? (state.totalPoints / state.maxPoints) * 100 : 0;
  const bar = document.getElementById('progressBar');
  bar.style.width = pct + '%';
  if(pct > 0) bar.classList.add('has-progress'); else bar.classList.remove('has-progress');
  document.getElementById('totalScore').textContent = state.totalPoints + ' / ' + state.maxPoints + ' pts';
}

function goToExercise(index) {
  state.currentExercise = index;
  renderNav();
  window.scrollTo({top:0, behavior:'smooth'});
  if(index === -1) renderWelcome();
  else if(index >= exercises.length) renderResults();
  else {
    // TRACKING : démarre le chrono pour cet exercice (si pas encore envoyé)
    startExerciseTimer(exercises[index].id);
    renderExercise(exercises[index]);
  }
}

// WELCOME
// ======================================================================

        <div class="feature-item"><span class="feature-icon">🎯</span><div><strong style="color:var(--text)">Ex. 1-2</strong><br>Les taux et le calcul de la TVA</div></div>

// ======================================================================
// RENDER DISPATCH — with recap for already-verified exercises
// ======================================================================
function renderExercise(ex) {
  if(state.verified[ex.id]) {
    renderCompleted(ex);
    return;
  }
  const renderers = {ex1:renderEx1,ex2:renderEx2,ex3:renderEx3,ex4:renderEx4,ex5:renderEx5,ex6:renderEx6,ex7:renderEx7};
  renderers[ex.id](ex);
}

function renderCompleted(ex) {
  const s = state.scores[ex.id]||0;
  const pct = Math.round((s/ex.maxScore)*100);
  const emoji = pct===100?'🎉':pct>=70?'👍':pct>=40?'📝':'💪';
  const color = pct===100?'var(--success)':pct>=70?'var(--accent)':pct>=40?'var(--warning)':'var(--error)';

  const idx = exercises.indexOf(ex);
  const isLast = idx >= exercises.length-1;
  const nextLabel = isLast ? 'Voir mes résultats 🏆' : 'Exercice suivant →';
  const nextCls = isLast ? 'btn btn-success' : 'btn btn-secondary';
  const nextIdx = isLast ? exercises.length : idx+1;

  document.getElementById('contentArea').innerHTML = `
    <div class="exercise-card" style="text-align:center;padding:48px 32px">
      <div class="exercise-header" style="justify-content:center">
        <span class="exercise-number">Exercice ${ex.number}</span>
        <span class="exercise-type">${ex.type}</span>
      </div>
      <h2 class="exercise-title" style="margin:12px 0 6px">${ex.title}</h2>
      <div style="font-size:3rem;margin:20px 0">${emoji}</div>
      <div style="font-family:'Space Mono',monospace;font-size:2rem;font-weight:700;color:${color};margin-bottom:8px">${s} / ${ex.maxScore}</div>
      <p style="color:var(--text-dim);margin-bottom:28px">
        ${pct===100?'Parfait ! Tu as maîtrisé cet exercice.':'Exercice terminé. Tu peux passer au suivant ou recommencer l\'ensemble.'}
      </p>
      <div class="btn-row" style="justify-content:center">
        ${idx > 0 ? `<button class="btn btn-secondary" onclick="goToExercise(${idx-1})">← Exercice précédent</button>` : ''}
        <button class="${nextCls}" onclick="goToExercise(${nextIdx})">${nextLabel}</button>
      </div>
    </div>`;
}

// Helper: boutons Vérifier + Suivant (Suivant désactivé jusqu'à vérification)
function btnRow(exId, nextIndex) {
  const isLast = nextIndex >= exercises.length;
  const nextLabel = isLast ? 'Voir mes résultats 🏆' : 'Exercice suivant →';
  const nextCls = isLast ? 'btn btn-success' : 'btn btn-secondary';
  return `<div class="btn-row">
    <button class="btn btn-primary" id="${exId}BtnCheck" onclick="check_${exId}()">Vérifier mes réponses ✓</button>
    <button class="${nextCls}" id="${exId}BtnNext" onclick="goToExercise(${isLast?exercises.length:nextIndex})" disabled>${nextLabel}</button>
  </div>`;
}

function enableNext(exId) {
  const nb = document.getElementById(exId+'BtnNext');
  if(nb){nb.disabled=false;nb.style.opacity='1';}

  if(isClose(parseInput(sdA.value),totA)){sdA.classList.add('correct');score+=2;}else{sdA.classList.add('wrong');sdA.value=fmt(totA);}

    const nVal=parseInput(nI.value);
    if(isClose(nVal,c.net,1)||isClose(nVal,Math.abs(c.net),1)){nI.classList.add('correct');score++;}
    else{nI.classList.add('wrong');nI.value=fmt(c.net);}

    const sBtns=document.querySelectorAll(`[data-ci="${ci}"]`);
    sBtns.forEach(b=>{b.disabled=true;b.classList.remove('selected-4110','selected-4510');if(b.dataset.s===c.status)b.classList.add('correct');});
    if(ex6Stat[ci]===c.status)score++;
    else{const w=document.querySelector(`[data-ci="${ci}"][data-s="${ex6Stat[ci]}"]`);if(w)w.classList.add('wrong');}
  });

  finishExercise('ex6',score,ex.maxScore);
}

function sel7(btn) {
  if(state.verified.ex7) return;
  const qi=btn.dataset.qi;
  document.getElementById('e7q'+qi).querySelectorAll('.account-btn').forEach(b=>b.classList.remove('selected-4110','selected-4510'));
  btn.classList.add('selected-'+btn.dataset.v);
  ex7Sel[qi]=btn.dataset.v;
}

function setSt7(s) {
  if(state.verified.ex7) return;
  ex7Stat=s;
  document.getElementById('e7btnV').classList.remove('selected-4510','selected-4110');
  document.getElementById('e7btnR').classList.remove('selected-4510','selected-4110');
  if(s==='verser') document.getElementById('e7btnV').classList.add('selected-4510');
  else document.getElementById('e7btnR').classList.add('selected-4110');
}

function check_ex7() {
  if(state.verified.ex7) return;
  state.verified.ex7=true;
  const ex=exercises[6];
  const achats=ex.operations.filter(o=>o.type==='achat'),ventes=ex.operations.filter(o=>o.type==='vente');
  const totA=achats.reduce((s,o)=>s+o.tva,0),totV=ventes.reduce((s,o)=>s+o.tva,0),net=totV-totA;
  const correctSt=net>=0?'verser':'récupérer';
  let score=0;

  ex.operations.forEach((o,i)=>{
    const g=document.getElementById('e7q'+i);
    const btns=g.querySelectorAll('.account-btn');
    const tI=document.getElementById('e7t'+i);
    const ct=o.type==='achat'?'4110':'4510';
    btns.forEach(b=>{b.disabled=true;b.classList.remove('selected-4110','selected-4510');if(b.dataset.v===ct)b.classList.add('correct');});
    tI.disabled=true;
    if(ex7Sel[i]===ct)score++;
    else{const w=g.querySelector(`[data-v="${ex7Sel[i]}"]`);if(w)w.classList.add('wrong');}
    if(isClose(parseInput(tI.value),o.tva)){tI.classList.add('correct');score++;}
    else{tI.classList.add('wrong');tI.value=fmt(o.tva);}
  });

  achats.forEach((o,i)=>{const inp=document.getElementById('e7a'+i);inp.disabled=true;if(isClose(parseInput(inp.value),o.tva)){inp.classList.add('correct');score++;}else{inp.classList.add('wrong');inp.value=fmt(o.tva);}});
  ventes.forEach((o,i)=>{const inp=document.getElementById('e7v'+i);inp.disabled=true;if(isClose(parseInput(inp.value),o.tva)){inp.classList.add('correct');score++;}else{inp.classList.add('wrong');inp.value=fmt(o.tva);}});

  const sdA=document.getElementById('e7sdA');sdA.disabled=true;
  if(isClose(parseInput(sdA.value),totA,0.5)){sdA.classList.add('correct');score++;}else{sdA.classList.add('wrong');sdA.value=fmt(totA);}
  const scV=document.getElementById('e7scV');scV.disabled=true;
  if(isClose(parseInput(scV.value),totV,0.5)){scV.classList.add('correct');score++;}else{scV.classList.add('wrong');scV.value=fmt(totV);}

  const nI=document.getElementById('e7net');nI.disabled=true;
  const nVal=parseInput(nI.value);
  if(isClose(nVal,net,1)||isClose(nVal,Math.abs(net),1)){nI.classList.add('correct');score++;}
  else{nI.classList.add('wrong');nI.value=fmt(net);}

  const vB=document.getElementById('e7btnV'),rB=document.getElementById('e7btnR');
  vB.disabled=true;rB.disabled=true;
  vB.classList.remove('selected-4110','selected-4510');rB.classList.remove('selected-4110','selected-4510');
  if(correctSt==='verser')vB.classList.add('correct');else rB.classList.add('correct');
  if(ex7Stat===correctSt)score++;
  else if(ex7Stat){(ex7Stat==='verser'?vB:rB).classList.add('wrong');}

  score=Math.min(score,ex.maxScore);
  finishExercise('ex7',score,ex.maxScore);
}

// ======================================================================
// FINISH & FEEDBACK
// ======================================================================
function finishExercise(exId,score,maxScore) {
  const prev=state.scores[exId]||0;
  if(score>prev){state.totalPoints+=(score-prev);state.scores[exId]=score;}
  state.completed[exId]=true;

  // ============================================================
  // TRACKING : anti-doublon + arrêt chrono + envoi au Google Sheet
  // ============================================================
  if (!APP.completedExercises.includes(exId)) {
    APP.completedExercises.push(exId);
    const result = stopExerciseTimer(exId);
    const niveau = EXERCISE_FULL_NAMES[exId] || exId;
    const temps = result ? result.temps : 0;
    sendResult(niveau, score, maxScore, temps);
  }

  const pct=Math.round((score/maxScore)*100);
  const fb=document.getElementById(exId+'Feedback');
  let msg,cls;
  if(pct===100){msg=`🎉 <strong>Parfait !</strong> ${score}/${maxScore} points — Excellente maîtrise !`;cls='success';}
  else if(pct>=70){msg=`👍 <strong>Bien joué !</strong> ${score}/${maxScore} points — Quelques erreurs, regarde les corrections ci-dessus.`;cls='partial';}
  else if(pct>=40){msg=`📝 <strong>Pas mal !</strong> ${score}/${maxScore} points — Revois la théorie et étudie les corrections.`;cls='partial';}
  else{msg=`💪 <strong>Courage !</strong> ${score}/${maxScore} points — Relis le cours attentivement avant de réessayer.`;cls='error';}

  fb.innerHTML=msg;
  fb.className='feedback show '+cls;
  enableNext(exId);
  updateProgress();
  renderNav();
  if(pct===100) launchConfetti();
}

function renderResults() {
  const pct=Math.round((state.totalPoints/state.maxPoints)*100);
  let trophy,message;
  if(pct>=90){trophy='🏆';message='Exceptionnel ! Tu maîtrises parfaitement la TVA !';}
  else if(pct>=70){trophy='🥈';message='Très bien ! Tu as de bonnes bases. Continue !';}
  else if(pct>=50){trophy='🥉';message='Pas mal ! Il reste des points à améliorer.';}
  else{trophy='📚';message='Il faut encore travailler. Revois le cours et réessaie !';}

  let rows=exercises.map(ex=>{
    const s=state.scores[ex.id]||0;const p=Math.round((s/ex.maxScore)*100);
    let c=p===100?'perfect':p>=70?'good':p>=40?'mid':'low';
    return `<div class="result-row"><span class="ex-name">Ex. ${ex.number} — ${ex.title}</span><span class="ex-score ${c}">${s}/${ex.maxScore}</span></div>`;
  }).join('');

  document.getElementById('contentArea').innerHTML=`
    <div class="exercise-card"><div class="results-screen">
      <span class="results-trophy">${trophy}</span>
      <div class="results-score">${state.totalPoints} / ${state.maxPoints}</div>
      <div class="results-label">${message}</div>
      <div class="results-breakdown">${rows}</div>
      <button class="btn btn-primary" onclick="resetAll()" style="font-size:1rem;padding:14px 32px">Recommencer 🔄</button>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap;">
        <button onclick="openLB('app')" style="padding:10px 20px; border-radius:10px; border:1px solid var(--primary,#4f8cff); background:transparent; color:var(--primary,#4f8cff); font-weight:700; cursor:pointer; font-family:inherit; font-size:0.9rem;">🏆 Classement</button>

function launchConfetti() {
  document.querySelectorAll('.confetti-container').forEach(c=>c.remove());
  const ct=document.createElement('div');ct.className='confetti-container';document.body.appendChild(ct);
  const cols=['#4f8cff','#e879f9','#2dd4a0','#ffb347','#ffd700','#ff5f6d'];
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.animationDelay=Math.random()*1+'s';
    p.style.animationDuration=(2+Math.random()*1.5)+'s';
    p.style.width=(6+Math.random()*8)+'px';
    p.style.height=(6+Math.random()*8)+'px';
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    ct.appendChild(p);
  }
  setTimeout(()=>ct.remove(),3500);
}

function showEmailModal() {
  const overlay = document.getElementById('emailOverlay');
  overlay.style.display = 'flex';
  const input = document.getElementById('emailInput');
  const saved = localStorage.getItem('student_email');
  if (saved) input.value = saved;
  setTimeout(() => input.focus(), 50);
  document.getElementById('emailError').textContent = '';
}

function validateEmail() {
  const input = document.getElementById('emailInput');
  const btn = document.getElementById('emailBtn');
  const errDiv = document.getElementById('emailError');
  const email = input.value.trim().toLowerCase();

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errDiv.textContent = '⚠️ Entre une adresse email valide.';
    input.style.borderColor = '#ff5f6d';
    return;
  }

  btn.textContent = '⏳ Vérification…';
  btn.disabled = true;
  errDiv.textContent = '';
  input.style.borderColor = '';

  const cbName = '_emailCb_' + Date.now();
  const timeout = setTimeout(() => {
    delete window[cbName];
    const s = document.getElementById(cbName);
    if (s) s.remove();
    errDiv.textContent = '⚠️ Connexion impossible. Vérifie ta connexion internet.';
    btn.textContent = '✅ Vérifier et commencer';
    btn.disabled = false;
  }, 10000);

  window[cbName] = function(resp) {
    clearTimeout(timeout);
    delete window[cbName];
    const s = document.getElementById(cbName);
    if (s) s.remove();
    btn.textContent = '✅ Vérifier et commencer';
    btn.disabled = false;

    if (resp && resp.found) {
      const oldEmail = localStorage.getItem('student_email');
      localStorage.setItem('student_email', email);
      localStorage.setItem('student_classe', resp.classe || '');
      APP.email = email;
      APP.classe = resp.classe || '';

      if (oldEmail && oldEmail !== email) {
        resetProgression();
      }

      TRACKING.sessionId = new Date().toISOString();
      document.getElementById('emailOverlay').style.display = 'none';
      startGlobalTimer();
      updateStudentBadge();
    } else {
      errDiv.textContent = "⚠️ Cette adresse email n'est pas enregistrée. Vérifie l'orthographe ou demande à ton professeur de t'ajouter à la liste.";
      input.style.borderColor = '#ff5f6d';
    }
  };

  const sc = document.createElement('script');
  sc.id = cbName;
  sc.src = `${TRACKING.scriptUrl}?action=check_email&email=${encodeURIComponent(email)}&callback=${cbName}`;
  sc.onerror = () => {
    clearTimeout(timeout);
    delete window[cbName];
    sc.remove();
    errDiv.textContent = '⚠️ Erreur de connexion au serveur.';
    btn.textContent = '✅ Vérifier et commencer';
    btn.disabled = false;
  };
  document.body.appendChild(sc);
}

  const el = document.getElementById('globalTimer');

  const elapsed = Math.floor((Date.now() - APP.globalTimerStart) / 1000);
  el.textContent = '⏱️ ' + String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0');
}

// ======================================================================
// TRACKING — Chronomètre par exercice (invisible)
// ======================================================================
function startExerciseTimer(exId) {
  // Ne redémarre pas si déjà envoyé pour cette session
  if (APP.completedExercises.includes(exId)) return;
  APP.exerciseStartTime = Date.now();
}

function stopExerciseTimer(exId) {
  if (!APP.exerciseStartTime) return null;
  const tempsSec = Math.round((Date.now() - APP.exerciseStartTime) / 1000);
  APP.exerciseTimes[exId] = tempsSec;
  APP.exerciseStartTime = null;
  return { temps: tempsSec };
}

// ======================================================================
// TRACKING — Envoi des résultats au Google Sheet (POST no-cors)
// ======================================================================
function sendResult(niveau, points, pointsMax, temps) {
  if (!APP.email || !TRACKING.sessionId) {
    console.warn('[TRACKING] Envoi annulé : email ou sessionId manquant');
    return;
  }
  const payload = {
    email: APP.email,
    classe: APP.classe,
    app: TRACKING.appName,
    niveau: niveau,
    points: points,
    pointsMax: pointsMax,
    temps: temps,
    totalNiveaux: TRACKING.totalNiveaux,
    sessionId: TRACKING.sessionId
  };
  console.log('[TRACKING] Envoi:', payload);
  fetch(TRACKING.scriptUrl, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  }).catch(err => console.warn('[TRACKING] Erreur envoi:', err));
}

// ======================================================================
// TRACKING — Modal Classement (JSONP exclusivement, jamais fetch en GET)
// ======================================================================
let currentLBTab = 'app';

function openLB(tab) {
  if (!APP.email) {
    showEmailModal();
    return;
  }
  document.getElementById('lbOverlay').style.display = 'block';
  switchLBTab(tab || 'app');
}

function closeLB() {
  document.getElementById('lbOverlay').style.display = 'none';
}

function switchLBTab(tab) {
  currentLBTab = tab;
  const btnApp = document.getElementById('lbTabApp');
  const btnGlobal = document.getElementById('lbTabGlobal');
  const title = document.getElementById('lbTitle');
  const classeLabel = APP.classe ? ` (${APP.classe})` : '';
  if (tab === 'app') {
    btnApp.style.background = 'var(--primary,#4f8cff)'; btnApp.style.color = '#fff';
    btnGlobal.style.background = 'transparent'; btnGlobal.style.color = '#ffb347';
    if (title) title.textContent = `🏆 Classement — ${TRACKING.appName}${classeLabel}`;
  } else {
    btnGlobal.style.background = '#ffb347'; btnGlobal.style.color = '#1a1f2e';
    btnApp.style.background = 'transparent'; btnApp.style.color = 'var(--primary,#4f8cff)';
    if (title) title.textContent = `🌍 Classement général${classeLabel}`;
  }
  fetchLeaderboard(tab);
}

function fetchLeaderboard(tab) {
  const content = document.getElementById('lbContent');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim,#8b95a7);">⏳ Chargement…</div>';

  const action = tab === 'app' ? 'leaderboard_app' : 'leaderboard_global';
  const cbName = '_lbCb_' + Date.now();

  const timeout = setTimeout(() => {
    delete window[cbName];
    const s = document.getElementById(cbName);
    if (s) s.remove();
    content.innerHTML = '<div style="text-align:center;padding:40px;"><div style="color:#ff5f6d;margin-bottom:12px;">⚠️ Connexion impossible</div><button onclick="fetchLeaderboard(\''+tab+'\')" style="padding:8px 20px;border-radius:8px;border:1px solid var(--border,rgba(255,255,255,0.1));background:var(--bg,#0f1419);color:var(--text,#fff);cursor:pointer;font-family:inherit;">Réessayer</button></div>';
  }, 10000);

  window[cbName] = function(resp) {
    clearTimeout(timeout);
    delete window[cbName];
    const s = document.getElementById(cbName);
    if (s) s.remove();
    const lbData = resp && (resp.leaderboard || resp.data);
    if (!lbData || lbData.length === 0) {
      content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim,#8b95a7);">🏁 Aucun résultat pour le moment</div>';
      return;
    }
    renderLeaderboard(lbData, tab);
  };

  let url = `${TRACKING.scriptUrl}?action=${action}&callback=${cbName}&mode=last`;
  if (tab === 'app') url += `&app=${encodeURIComponent(TRACKING.appName)}`;
  if (APP.classe) url += `&classe=${encodeURIComponent(APP.classe)}`;
  const sc = document.createElement('script');
  sc.id = cbName;
  sc.src = url;
  sc.onerror = () => {
    clearTimeout(timeout);
    delete window[cbName];
    sc.remove();
    content.innerHTML = '<div style="text-align:center;padding:40px;color:#ff5f6d;">⚠️ Erreur de connexion</div>';
  };
  document.body.appendChild(sc);
}

function renderLeaderboard(data, tab) {
  const content = document.getElementById('lbContent');
  const myEmail = (APP.email || '').toLowerCase();

  // Classement général : tri par pourcentage côté client (plus équitable)
  if (tab === 'global' && data.length > 0) {
    data = data.slice().sort((a, b) => {
      const pctA = a.pct || 0;
      const pctB = b.pct || 0;
      if (pctB !== pctA) return pctB - pctA;
      return (a.totalTemps || 0) - (b.totalTemps || 0);
    });
    data.forEach((entry, i) => { entry.rang = i + 1; });
  }

  const me = data.find(r => r.email === myEmail);
  let html = '';

  // Encart personnel
  if (me) {
    const pct = me.pct != null ? me.pct : (me.pourcentage != null ? me.pourcentage : 0);
    const count = tab === 'app'
      ? (me.niveauxCompletes || me.niveaux || 0)
      : (me.appsCompletes || me.apps || 0);
    const total = tab === 'app' ? (me.totalNiveaux || 0) : (me.totalPossibleNiveaux || 0);
    const label = tab === 'app' ? 'niveaux' : 'apps';
    const prog = total > 0 ? count + '/' + total + ' ' + label : count + ' ' + label;
    const pctC = pct >= 80 ? '#2dd4a0' : pct >= 50 ? '#ffb347' : '#ff5f6d';
    html += `<div style="background:rgba(79,140,255,0.06);border:1px solid rgba(79,140,255,0.25);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:8px;">
      <div><div style="font-size:1.3rem;font-weight:800;color:var(--primary,#4f8cff);">#${me.rang}</div><div style="font-size:0.7rem;color:var(--text-dim,#8b95a7);">RANG</div></div>
      <div><div style="font-size:1.3rem;font-weight:800;color:var(--text,#fff);">${me.totalPoints}</div><div style="font-size:0.7rem;color:var(--text-dim,#8b95a7);">POINTS</div></div>
      <div><div style="font-size:1.3rem;font-weight:800;color:${pctC};">${pct}%</div><div style="font-size:0.7rem;color:var(--text-dim,#8b95a7);">RÉUSSITE</div></div>
      <div><div style="font-size:1.1rem;font-weight:800;color:var(--text-dim,#8b95a7);">${prog}</div><div style="font-size:0.7rem;color:var(--text-dim,#8b95a7);">PROGRESSION</div></div>
    </div>`;
  }

  // Tableau
  const medals = ['🥇','🥈','🥉'];
  html += '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;color:var(--text,#fff);"><tr style="border-bottom:1px solid var(--border,rgba(255,255,255,0.1));"><th style="text-align:left;padding:8px 4px;color:var(--text-dim,#8b95a7);font-size:0.72rem;">#</th><th style="text-align:left;padding:8px 4px;color:var(--text-dim,#8b95a7);font-size:0.72rem;">Élève</th><th style="text-align:right;padding:8px 4px;color:var(--text-dim,#8b95a7);font-size:0.72rem;">Pts</th><th style="text-align:right;padding:8px 4px;color:var(--text-dim,#8b95a7);font-size:0.72rem;">%</th><th style="text-align:right;padding:8px 4px;color:var(--text-dim,#8b95a7);font-size:0.72rem;">Temps</th></tr>';

  data.forEach(row => {
    const r = row.rang || 0;
    const name = row.email.split('@')[0].split(/[._-]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    const pct = row.pct != null ? row.pct : (row.pourcentage != null ? row.pourcentage : 0);
    const temps = row.totalTemps || row.totalTime || 0;
    const isMe = row.email === myEmail;
    const pctC = pct >= 80 ? '#2dd4a0' : pct >= 50 ? '#ffb347' : '#ff5f6d';
    let tStr = '—';
    if (temps > 0) {
      const m = Math.floor(temps / 60), s = temps % 60;
      tStr = m > 0 ? m + 'm' + String(s).padStart(2, '0') + 's' : s + 's';
    }
    html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.04);background:${isMe ? 'rgba(79,140,255,0.08)' : 'transparent'};"><td style="padding:8px 4px;font-weight:700;">${r <= 3 ? medals[r - 1] : r}</td><td style="padding:8px 4px;${isMe ? 'font-weight:800;color:var(--primary,#4f8cff);' : ''}">${name}</td><td style="padding:8px 4px;text-align:right;font-weight:700;color:var(--primary,#4f8cff);">${row.totalPoints}</td><td style="padding:8px 4px;text-align:right;font-weight:700;color:${pctC};">${pct}%</td><td style="padding:8px 4px;text-align:right;color:var(--text-dim,#8b95a7);font-family:'Space Mono',monospace;font-size:0.78rem;">${tStr}</td></tr>`;
  });
  html += '</table>';
  content.innerHTML = html;
}

// ======================================================================

updateProgress();renderNav();renderWelcome();
updateStudentBadge();
showEmailModal();  // Toujours afficher au lancement
</script>
